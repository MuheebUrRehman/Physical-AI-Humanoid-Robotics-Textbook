name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]
    paths:
      - 'my_project/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Get code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: "my_project/backend/.python-version"

    - name: Install backend dependencies
      run: uv sync
      working-directory: my_project/backend

    - name: Run backend tests
      run: uv run pytest tests/ -v
      working-directory: my_project/backend
      env:
        COHERE_API_KEY: test-key
        QDRANT_API_KEY: test-key
        LLM_API_KEY: test-key
        QDRANT_HOST: localhost

    - name: Install ingestion dependencies
      run: uv sync
      working-directory: my_project/ingestion

    - name: Run ingestion tests
      run: uv run pytest tests/ -v
      working-directory: my_project/ingestion
      env:
        COHERE_API_KEY: test-key
        QDRANT_API_KEY: test-key
        QDRANT_HOST: localhost

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Get code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Deploy
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
        HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
      run: |
        git config --global user.email "bot@github.com"
        git config --global user.name "Bot"

        git clone https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf

        cp my_project/backend/app.py hf/
        cp my_project/backend/agent.py hf/
        cp my_project/backend/config.py hf/
        cp my_project/backend/retrieval.py hf/
        cp my_project/backend/pyproject.toml hf/
        cp my_project/backend/uv.lock hf/
        cp my_project/backend/Dockerfile hf/
        cp my_project/backend/store.py hf/
        cp my_project/backend/chatkit_server.py hf/
        cp -r my_project/backend/models hf/
        cp -r my_project/backend/utils hf/
        cp -r my_project/backend/scripts hf/

        cd hf
        git add .
        git commit -m "Deploy: Update backend files" || echo "No changes to commit"
        git push https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME main
